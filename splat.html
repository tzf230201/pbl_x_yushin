<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scaniverse Splat Viewer</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        display: grid;
        place-items: center;
        color: #f8fafc;
        background: #111820;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(520px, calc(100% - 32px));
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.55;
      }

      a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening splat viewer</h1>
      <p>
        If the viewer does not open automatically,
        <a id="viewer-link" href="./splat-viewer/index.html">open it here</a>.
      </p>
    </main>

    <script>
      const SPLATS = {
        main: "./public/assets/splats/main.ply",
        "main-sog": "./public/assets/splats/main.sog",
      };

      const currentUrl = new URL(window.location.href);
      const splatId =
        currentUrl.searchParams.get("splat") ||
        currentUrl.searchParams.get("scan") ||
        "main";
      const file = currentUrl.searchParams.get("file") || SPLATS[splatId] || SPLATS.main;

      const viewerUrl = new URL("./splat-viewer/index.html", window.location.href);
      viewerUrl.searchParams.set("content", new URL(file, window.location.href).href);
      viewerUrl.searchParams.set(
        "settings",
        new URL("./splat-viewer/settings.json", window.location.href).href,
      );
      viewerUrl.searchParams.set("webgl", "");
      viewerUrl.searchParams.set("aa", "");

      document.querySelector("#viewer-link").href = viewerUrl.href;
      window.location.replace(viewerUrl.href);
    </script>
  </body>
</html>
