<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PBL x Yushin — Splat Viewer (.ply)</title>
    <style>
      :root {
        --bg: #0e1116;
        --panel: #161b22;
        --border: #262d38;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #4f9dff;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 24px 16px 48px;
      }
      .wrap { max-width: 760px; margin: 0 auto; }
      header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 24px; gap: 12px; flex-wrap: wrap;
      }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; }
      .logo { color: var(--accent); font-size: 20px; }
      .accent { color: var(--accent); }
      .back {
        color: var(--muted); text-decoration: none; font-size: 14px;
        padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
      }
      .back:hover { color: var(--text); background: #1f2733; }
      h1 { font-size: 18px; margin-bottom: 6px; }
      .sub { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
      .list { display: grid; gap: 10px; }
      .card {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: 14px 16px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        text-decoration: none; color: var(--text);
        transition: border-color 0.15s, background 0.15s;
      }
      .card:hover { border-color: var(--accent); background: #1a212b; }
      .card .name { font-weight: 600; font-size: 15px; }
      .card .file { color: var(--muted); font-size: 12px; margin-top: 2px; word-break: break-all; }
      .card .side { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
      .card .size {
        color: var(--accent); font-size: 12px; font-weight: 600;
        border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px;
      }
      .card .alt { color: var(--muted); font-size: 11px; text-decoration: underline; }
      .card .alt:hover { color: var(--text); }
      .note { margin-top: 22px; color: var(--muted); font-size: 13px; line-height: 1.6; }
      .note code { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; }

      .upload {
        display: flex; align-items: center; gap: 14px;
        padding: 16px;
        margin-bottom: 14px;
        border: 2px dashed var(--border);
        border-radius: 12px;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }
      .upload:hover, .upload.dragover { border-color: var(--accent); background: rgba(79, 157, 255, 0.08); }
      .upload-icon { font-size: 22px; color: var(--accent); }
      .muted-s { color: var(--muted); font-size: 12px; }

      /* Fullscreen iframe shown when viewing an uploaded file.
         The parent page must stay alive so the blob URL keeps working. */
      .frame-wrap { position: fixed; inset: 0; z-index: 50; background: #000; }
      .frame-wrap iframe { width: 100%; height: 100%; border: 0; }
      .frame-close {
        position: absolute; top: max(10px, env(safe-area-inset-top)); right: 12px;
        z-index: 51;
        border: none; border-radius: 999px;
        background: rgba(14, 17, 22, 0.85); color: var(--text);
        padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
      }
      .frame-close:hover { background: var(--accent); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="brand"><span class="logo">◆</span> PBL <span class="accent">x</span> Yushin — Splats</div>
        <a class="back" href="./">← GLB Viewer</a>
      </header>

      <h1>Gaussian Splat scans (.ply)</h1>
      <p class="sub">Tap a scan to open it — works on phones, with an AR mode.</p>

      <label class="upload" id="uploadZone">
        <input type="file" id="plyInput" accept=".ply,.splat,.ksplat" hidden />
        <span class="upload-icon">⬆</span>
        <span><strong>Open your own .ply file</strong><br />
        <span class="muted-s">tap to choose, or drag &amp; drop it here</span></span>
      </label>

      <div id="list" class="list"></div>

      <p class="note">
        Direct link format: <code>splat.html?splat=ID</code> — useful for QR codes.<br />
        You can also open any hosted file with <code>splat.html?file=URL</code>.
      </p>
    </div>

    <script src="assets/splats-list.js"></script>
    <script>
      const SPLATS = window.SPLATS;
      const ALIASES = window.SPLAT_ALIASES;
      const BASE = window.SPLATS_BASE;

      // ---- Direct-link mode: ?splat=id or ?file=url redirects straight to the viewer ----
      const params = new URL(window.location.href).searchParams;
      const rawId = params.get("splat") || params.get("scan");
      const id = ALIASES[rawId] || rawId;
      const fileParam = params.get("file");

      if (fileParam) {
        window.location.replace("./splatview.html?file=" + encodeURIComponent(fileParam));
      } else if (id && SPLATS[id]) {
        // Direct links open the mobile/AR viewer
        window.location.replace("./splatview.html?splat=" + encodeURIComponent(id));
      } else {
        // ---- Picker mode: list all scans ----
        const list = document.getElementById("list");
        for (const [key, s] of Object.entries(SPLATS)) {
          const a = document.createElement("a");
          a.className = "card";
          a.href = "./splatview.html?splat=" + encodeURIComponent(key);
          a.innerHTML =
            '<div><div class="name"></div><div class="file"></div></div>' +
            '<span class="size">' + s.mb + " MB</span>';
          a.querySelector(".name").textContent = s.label;
          a.querySelector(".file").textContent = s.file + "  ·  ?splat=" + key;
          list.appendChild(a);
        }

        // ---- Local file upload ----
        // A blob URL only lives as long as the page that made it, so the
        // viewer is opened inside a fullscreen iframe instead of navigating.
        const plyInput = document.getElementById("plyInput");
        const uploadZone = document.getElementById("uploadZone");
        let activeBlobUrl = null;

        function openLocalFile(file) {
          if (!file) return;
          if (!/\.(ply|splat|ksplat)$/i.test(file.name)) {
            alert("Please choose a .ply file (Gaussian splat export).");
            return;
          }
          activeBlobUrl = URL.createObjectURL(file);

          const wrap = document.createElement("div");
          wrap.className = "frame-wrap";

          const closeBtn = document.createElement("button");
          closeBtn.className = "frame-close";
          closeBtn.textContent = "✕ Close — " + file.name;
          closeBtn.addEventListener("click", () => {
            wrap.remove();
            if (activeBlobUrl) { URL.revokeObjectURL(activeBlobUrl); activeBlobUrl = null; }
            plyInput.value = "";
          });

          const frame = document.createElement("iframe");
          frame.allow = "camera; gyroscope; accelerometer; xr-spatial-tracking; fullscreen";
          frame.src = "./splatview.html?file=" + encodeURIComponent(activeBlobUrl) +
                      "&name=" + encodeURIComponent(file.name);

          wrap.appendChild(frame);
          wrap.appendChild(closeBtn);
          document.body.appendChild(wrap);
        }

        plyInput.addEventListener("change", (e) => openLocalFile(e.target.files[0]));

        ["dragenter", "dragover"].forEach((ev) =>
          uploadZone.addEventListener(ev, (e) => {
            e.preventDefault();
            uploadZone.classList.add("dragover");
          })
        );
        ["dragleave", "drop"].forEach((ev) =>
          uploadZone.addEventListener(ev, (e) => {
            e.preventDefault();
            uploadZone.classList.remove("dragover");
          })
        );
        uploadZone.addEventListener("drop", (e) => openLocalFile(e.dataTransfer.files[0]));
      }
    </script>
  </body>
</html>
