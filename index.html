<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PBL x Yushin — GLB Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="topbar">
      <div class="brand">
        <span class="logo">◆</span>
        <span class="title">PBL <span class="accent">x</span> Yushin</span>
      </div>
      <div class="topbar-actions">
        <a class="btn btn-ghost" href="./webxr/">WebXR Viewer</a>
        <button id="fullscreen" class="btn btn-ghost" title="Toggle fullscreen">
          <span class="fs-icon">⛶</span>
          <span class="fs-label">Fullscreen</span>
        </button>
        <label class="btn btn-primary">
          <input type="file" id="fileInput" accept=".glb,.gltf" hidden />
          Open Model (.glb)
        </label>
      </div>
    </header>

    <!-- Viewer canvas -->
    <main id="viewer">
      <canvas id="scene"></canvas>

      <!-- Loading / drop hint -->
      <div id="dropHint" class="drop-hint">
        <div class="drop-inner">
          <div class="drop-icon">⬆</div>
          <p><strong>Drag &amp; drop a .glb file here</strong></p>
          <p class="muted">or click the "Open Model" button above</p>
        </div>
      </div>

      <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <span>Loading model…</span>
      </div>

      <!-- Zoom controls -->
      <div class="zoom-controls">
        <button id="zoomIn"  class="zoom-btn" title="Zoom in">+</button>
        <button id="zoomOut" class="zoom-btn" title="Zoom out">−</button>
        <button id="reset"   class="zoom-btn reset" title="Reset view">⟳</button>
        <button id="fullscreenMobile" class="zoom-btn fs-mobile" title="Toggle fullscreen">⛶</button>
      </div>

      <!-- Info footer -->
      <div class="hud">
        <span id="modelName">No model loaded</span>
      </div>
    </main>
  </div>

  <!-- Three.js via CDN import map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
