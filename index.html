<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PBL x Yuushin — GLB Viewer</title>

  <!-- PWA / true fullscreen when added to home screen -->
  <link rel="manifest" href="assets/manifest.json" />
  <meta name="theme-color" content="#0e1116" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Yuushin Viewer" />

  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="topbar">
      <div class="brand">
        <span class="logo">◆</span>
        <span class="title">PBL <span class="accent">x</span> Yuushin</span>
      </div>
      <div class="topbar-actions">
        <a class="btn btn-ghost" href="./webxr/">WebXR Viewer</a>
        <select id="envSelect" class="env-select" title="Environment / lighting">
          <option value="studio">🎬 Studio</option>
          <option value="sunset">🌇 Sunset</option>
          <option value="dawn">🌄 Dawn</option>
          <option value="night">🌃 Night</option>
          <option value="warehouse">🏭 Warehouse</option>
          <option value="forest">🌲 Forest</option>
          <option value="apartment">🛋️ Apartment</option>
          <option value="park">🏞️ Park</option>
          <option value="city">🏙️ City</option>
          <option value="lobby">🏨 Lobby</option>
          <option value="__upload">⬆️ Upload HDR…</option>
        </select>
        <input type="file" id="hdrInput" accept=".hdr,.hdri,.pic" hidden />
        <button id="arBtn" class="btn btn-ar" title="View in your space (AR)" hidden>
          <span class="ar-icon">◈</span>
          <span class="ar-label">AR</span>
        </button>
        <button id="fullscreen" class="btn btn-fs" title="Toggle fullscreen">
          <span class="fs-icon">⛶</span>
          <span class="fs-label">Fullscreen</span>
        </button>
        <label class="btn btn-primary">
          <input type="file" id="fileInput" accept=".glb,.gltf" hidden />
          Open Model (.glb)
        </label>
      </div>
    </header>

    <!-- Viewer canvas -->
    <main id="viewer">
      <video id="camFeed" class="cam-feed" playsinline muted autoplay></video>
      <canvas id="scene"></canvas>

      <!-- Loading / drop hint -->
      <div id="dropHint" class="drop-hint">
        <div class="drop-inner">
          <div class="drop-icon">⬆</div>
          <p><strong>Drag &amp; drop a .glb file here</strong></p>
          <p class="muted">or click the "Open Model" button above</p>
        </div>
      </div>

      <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <span>Loading model…</span>
      </div>

      <!-- Zoom controls -->
      <div class="zoom-controls">
        <button id="zoomIn"  class="zoom-btn" title="Zoom in">+</button>
        <button id="zoomOut" class="zoom-btn" title="Zoom out">−</button>
        <button id="reset"   class="zoom-btn reset" title="Reset view">⟳</button>
      </div>

      <!-- Info footer -->
      <div class="hud">
        <span id="modelName">No model loaded</span>
      </div>

      <!-- AR instruction overlay -->
      <div id="arHint" class="ar-hint hidden">
        <span id="arHintText">Point at the floor and tap to place the model</span>
        <button id="arExit" class="ar-exit">Exit AR</button>
      </div>
    </main>
  </div>

  <!-- Three.js via CDN import map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="assets/main.js"></script>
</body>
</html>
